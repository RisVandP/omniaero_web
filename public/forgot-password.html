<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniAero-OBB - 无人机视角多模态小目标检测平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="flex flex-col items-center justify-center px-6 pt-8 mx-auto md:h-screen pt:mt-0 bg-gradient-to-br from-blue-50 via-cyan-50 to-blue-100 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900">
    <a href="index.html" class="flex items-center justify-center mb-8 text-2xl font-semibold lg:mb-10 text-blue-900 dark:text-white">
        <!-- Logo 图片 -->
        <img src="assets/images/logo.png" alt="OmniAero-OBB Logo" class="w-12 h-12 mr-4 rounded-lg">
        <span>OmniAero-OBB</span>  
    </a>
    <!-- Card -->
    <div class="w-full max-w-xl p-6 space-y-8 sm:p-8 bg-white/90 rounded-2xl shadow-2xl border border-blue-200 dark:bg-gray-800/50 dark:border-gray-700/50">
        <div class="space-y-2">
            <h2 class="text-3xl font-bold text-blue-900 dark:text-white">
                忘记密码？
            </h2>
            <p class="text-black dark:text-gray-300">输入您的邮箱地址，我们将发送重置密码的链接</p>
        </div>
        <form class="mt-8 space-y-6" action="#">
            <div>
                <label for="email" class="block mb-2 text-sm font-medium text-blue-900 dark:text-white">邮箱地址</label>
                <input type="email" name="email" id="email" class="bg-blue-50 border border-blue-300 text-blue-900 placeholder-blue-400 sm:text-sm rounded-lg focus:ring-cyan-500 focus:border-cyan-500 block w-full p-3 dark:bg-gray-700/50 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-cyan-500 dark:focus:border-cyan-500" placeholder="your@email.com" required>
            </div>
            <button type="submit" class="w-full px-5 py-3 text-base font-medium text-center text-white rounded-lg bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 focus:ring-4 focus:ring-cyan-300 shadow-lg shadow-cyan-500/50 transition-all">
                发送重置链接
            </button>
            <div class="text-sm font-medium text-center text-black dark:text-gray-300">
                记起密码了？ <a href="sign-in.html" class="text-cyan-600 hover:text-cyan-700 hover:underline dark:text-cyan-400 dark:hover:text-cyan-300">返回登录</a>
            </div>
        </form>
    </div>
    
    <!-- Back to Home -->
    <div class="mt-6">
        <a href="index.html" class="text-sm text-black hover:text-cyan-600 transition-colors dark:text-black dark:hover:text-cyan-400">
            ← 返回首页
        </a>
    </div>
</div>

</body>
</html>
