<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniAero-OBB - 无人机视角多模态小目标检测平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="flex flex-col items-center justify-center px-6 pt-8 mx-auto md:h-screen pt:mt-0 bg-gradient-to-br from-blue-50 via-cyan-50 to-blue-100 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900">
    <a href="index.html" class="flex items-center justify-center mb-8 text-2xl font-semibold lg:mb-10 text-blue-900 dark:text-white">
        <!-- Logo 图片 -->
        <img src="assets/images/logo.png" alt="OmniAero-OBB Logo" class="w-12 h-12 mr-4 rounded-lg">
        <span>OmniAero-OBB</span>  
    </a>
    <!-- Card -->
    <div class="w-full max-w-xl p-6 space-y-8 sm:p-8 bg-white/90 rounded-2xl shadow-2xl border border-blue-200 dark:bg-gray-800/50 dark:border-gray-700/50">
        <div class="space-y-2">
            <h2 class="text-3xl font-bold text-blue-900 dark:text-white">
                欢迎回来
            </h2>
            <p class="text-black dark:text-gray-300">登录到无人机检测平台，开始使用智能检测服务</p>
        </div>
        <form class="mt-8 space-y-6" action="#">
            <div>
                <label for="email" class="block mb-2 text-sm font-medium text-black dark:text-white">邮箱地址</label>
                <input type="email" name="email" id="email" class="bg-blue-50 border border-blue-300 text-blue-900 placeholder-blue-400 sm:text-sm rounded-lg focus:ring-cyan-500 focus:border-cyan-500 block w-full p-3 dark:bg-gray-700/50 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-cyan-500 dark:focus:border-cyan-500" placeholder="your@email.com" required>
            </div>
            <div>
                <label for="password" class="block mb-2 text-sm font-medium text-black dark:text-white">密码</label>
                <input type="password" name="password" id="password" placeholder="••••••••" class="bg-blue-50 border border-blue-300 text-blue-900 placeholder-blue-400 sm:text-sm rounded-lg focus:ring-cyan-500 focus:border-cyan-500 block w-full p-3 dark:bg-gray-700/50 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-cyan-500 dark:focus:border-cyan-500" required>
            </div>
            <div class="flex items-start justify-between">
                <div class="flex items-center h-5">
                    <input id="remember" aria-describedby="remember" name="remember" type="checkbox" class="w-4 h-4 border-blue-300 rounded bg-blue-50 focus:ring-3 focus:ring-cyan-500 dark:focus:ring-cyan-600 dark:ring-offset-gray-800 dark:bg-gray-700 dark:border-gray-600">
                    <label for="remember" class="ml-3 text-sm font-medium text-black dark:text-gray-300">记住我</label>
                </div>
                <a href="forgot-password.html" class="text-sm text-cyan-600 hover:text-cyan-700 hover:underline dark:text-cyan-400 dark:hover:text-cyan-300">忘记密码？</a>
            </div>
            <button type="submit" class="w-full px-5 py-3 text-base font-medium text-center text-white rounded-lg bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 focus:ring-4 focus:ring-cyan-300 shadow-lg shadow-cyan-500/50 transition-all">
                登录账户
            </button>
            <div class="text-sm font-medium text-center text-black dark:text-gray-300">
                还没有账户？ <a href="sign-up.html" class="text-cyan-600 hover:text-cyan-700 hover:underline dark:text-cyan-400 dark:hover:text-cyan-300">立即注册</a>
            </div>
        </form>
        
        <!-- Divider -->
        <div class="relative">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-black dark:border-white/20"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 text-black bg-white dark:text-black dark:bg-transparent">或使用第三方登录</span>
            </div>
        </div>
        
        <!-- Social Login -->
        <div class="grid grid-cols-2 gap-4">
            <button type="button" class="flex items-center justify-center px-4 py-3 text-sm font-medium text-black transition-all border border-black rounded-lg hover:bg-blue-50 dark:text-white dark:border-white/20 dark:hover:bg-white/10">
                <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24" fill="#000000" dark:fill="#ffffff">
                    <path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/>
                </svg>
                Google
            </button>
            <button type="button" class="flex items-center justify-center px-4 py-3 text-sm font-medium text-black transition-all border border-black rounded-lg hover:bg-blue-50 dark:text-white dark:border-white/20 dark:hover:bg-white/10">
                <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24" fill="#000000" dark:fill="#ffffff">
                    <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                </svg>
                GitHub
            </button>
        </div>
    </div>
    
    <!-- Back to Home -->
    <div class="mt-6">
        <a href="index.html" class="text-sm text-black hover:text-cyan-600 transition-colors dark:text-black dark:hover:text-cyan-400">
            ← 返回首页
        </a>
    </div>
</div>
<script>
    document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();
            if (response.ok) {
                // 关键：保存“门禁卡” Token 到浏览器本地存储
                localStorage.setItem('drone_token', result.data.token);
                // 跳转到控制台工作台
                window.location.href = "dashboard.html";
            } else {
                alert(result.message || "登录失败，请检查邮箱或密码");
            }
        } catch (error) {
            alert("连接后端服务失败");
        }
    });
</script>
</body>
</html>
